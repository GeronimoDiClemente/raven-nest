name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install git-crypt
        run: sudo apt-get install -y git-crypt

      - name: Decrypt repository
        run: |
          echo "$GIT_CRYPT_KEY" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm /tmp/git-crypt-key
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (skip postinstall for cross-compile)
        run: npm ci --ignore-scripts

      - name: Build Windows
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release v0.1.5
        run: |
          find dist -name "*.exe" | while read f; do
            echo "Uploading $f"
            gh release upload v0.1.5 "$f" --repo GeronimoDiClemente/raven-nest --clobber
          done
          find dist -name "latest.yml" -o -name "latest-win.yml" | while read f; do
            gh release upload v0.1.5 "$f" --repo GeronimoDiClemente/raven-nest --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
